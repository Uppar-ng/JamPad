<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Primer • Favorites</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #DBEAFE;
            --background: #F5F7FA;
            --surface: #FFFFFF;
            --surface-hover: #F8FAFC;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-tertiary: #94A3B8;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --header-height: 60px;
            --safe-area: env(safe-area-inset-bottom, 0px);
            --bottom-nav-height: 70px;
        }

        [data-theme="dark"] {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #1E3A8A;
            --background: #0F172A;
            --surface: #1E293B;
            --surface-hover: #334155;
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-tertiary: #94A3B8;
            --border: #334155;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        #app {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--background);
        }

        /* Transparent Header */
        .app-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 10;
            pointer-events: none;
        }

        .header-content {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: auto;
        }

        .logo {
            font-weight: 700;
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-color: rgba(255,255,255,0.8);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(8px);
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: var(--surface-hover);
        }

        /* Content Area - scrollable */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: calc(var(--header-height) + 16px) 16px 80px;
            -webkit-overflow-scrolling: touch;
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .favorite-count {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Favorite Items */
        .favorite-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .favorite-item:active {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .item-avatar {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary-light);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            border: 2px solid var(--surface);
            box-shadow: var(--shadow);
        }

        .item-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }

        .premium-crown {
            position: absolute;
            top: -3px;
            right: -3px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid var(--surface);
            z-index: 2;
        }

        .item-info {
            flex: 1;
        }

        .item-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .item-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }

        .primer-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 8px;
            font-weight: 700;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .item-meta i {
            color: #FBBF24;
            font-size: 10px;
        }

        .item-location {
            font-size: 11px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-location i {
            color: var(--primary);
            font-size: 10px;
        }

        .item-services {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .service-tag {
            background: var(--surface-hover);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 9px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .remove-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #FEE2E2;
            border: none;
            color: #EF4444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .remove-btn:active {
            background: #FECACA;
            transform: scale(0.95);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state i {
            font-size: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
            color: var(--primary-light);
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            margin-bottom: 24px;
            color: var(--text-secondary);
        }

        .empty-btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .empty-btn:active {
            background: var(--primary-dark);
            transform: scale(0.98);
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }

        .loading-state i {
            font-size: 32px;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
            color: var(--primary);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(var(--bottom-nav-height) + 20px);
            left: 20px;
            right: 20px;
            max-width: 440px;
            margin: 0 auto;
            background: var(--surface);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideUp 0.3s;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Bottom Navigation - 4 items */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 calc(8px + var(--safe-area));
            z-index: 20;
            height: var(--bottom-nav-height);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 10px;
            gap: 2px;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 22px;
            font-weight: 400;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item .label {
            font-weight: 500;
            font-size: 11px;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Transparent Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">Favorites</div>
                <div class="header-actions">
                    <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="content" id="content">
            <div class="loading-state">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Loading favorites...</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-building"></i>
                <span class="label">Home</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-heart"></i>
                <span class="label">Saved</span>
            </a>
            <a href="account.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span class="label">Account</span>
            </a>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        (function() {
            // ========== THEME ==========
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            function syncTheme() {
                const saved = localStorage.getItem('primer_theme') || 'light';
                html.setAttribute('data-theme', saved);
                themeToggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
            syncTheme();
            
            themeToggle.addEventListener('click', () => {
                const current = html.getAttribute('data-theme') || 'light';
                const next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('primer_theme', next);
                themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // ========== DATA ==========
            let allProviders = [];
            let favoriteIds = [];
            let userCity = 'Kaduna';

            // Load user data
            function loadUserData() {
                try {
                    const saved = localStorage.getItem('primer_user');
                    if (saved) {
                        const user = JSON.parse(saved);
                        userCity = user.city || 'Kaduna';
                    }
                } catch (e) {
                    console.error('Error loading user:', e);
                }
            }

            // Load favorites (always from localStorage)
            function loadFavorites() {
                try {
                    const saved = localStorage.getItem('primer_favorites');
                    favoriteIds = saved ? JSON.parse(saved) : [];
                    // Ensure it's an array
                    if (!Array.isArray(favoriteIds)) {
                        favoriteIds = [];
                    }
                } catch (e) {
                    console.error('Error loading favorites:', e);
                    favoriteIds = [];
                }
                return favoriteIds;
            }

            // Save favorites and notify other pages
            function saveFavorites() {
                localStorage.setItem('primer_favorites', JSON.stringify(favoriteIds));
                // Dispatch event for other pages to listen
                window.dispatchEvent(new CustomEvent('favoritesUpdated', { 
                    detail: favoriteIds 
                }));
            }

            // ========== LOAD PROVIDERS ==========
            async function loadProviders() {
                const content = document.getElementById('content');
                
                try {
                    // Try to load from cache first
                    if (allProviders.length > 0) {
                        const favorites = allProviders.filter(p => favoriteIds.includes(p.id));
                        renderFavorites(favorites);
                        return;
                    }

                    const response = await fetch('providers.json');
                    if (!response.ok) throw new Error('Failed to load');
                    
                    const data = await response.json();
                    allProviders = data.providers || [];
                    
                    // Get favorite providers
                    const favorites = allProviders.filter(p => favoriteIds.includes(p.id));
                    
                    renderFavorites(favorites);
                    
                } catch (error) {
                    console.error('Failed to load:', error);
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>Oops!</h3>
                            <p>Couldn't load your favorites</p>
                            <button class="empty-btn" onclick="location.reload()">Try Again</button>
                        </div>
                    `;
                }
            }

            // ========== RENDER ==========
            function renderFavorites(favorites) {
                const content = document.getElementById('content');
                
                if (favorites.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="far fa-heart"></i>
                            <h3>No favorites yet</h3>
                            <p>Tap the heart icon on any provider to save them here</p>
                            <a href="index.html" class="empty-btn">Browse Providers</a>
                        </div>
                    `;
                    return;
                }

                // Sort favorites by name
                const sortedFavorites = [...favorites].sort((a, b) => 
                    (a.name || '').localeCompare(b.name || '')
                );

                let html = `
                    <div class="section-header">
                        <h2>Saved Providers</h2>
                        <span class="favorite-count">${favorites.length} ${favorites.length === 1 ? 'item' : 'items'}</span>
                    </div>
                `;
                
                sortedFavorites.forEach(provider => {
                    const avatar = provider.avatar || `https://ui-avatars.com/api/?name=${provider.name}&background=2563EB&color=fff`;
                    const isPremium = provider.isPrimerOwned || false;
                    const location = provider.currentLocation || 'Unknown location';
                    const rating = provider.rating || '4.5';
                    const jobs = provider.completedJobs || 0;
                    const services = provider.services || [];
                    
                    html += `
                        <div class="favorite-item" onclick="viewProvider('${provider.id}')">
                            <div class="item-avatar">
                                <img src="${avatar}" alt="${provider.name}" 
                                     onerror="this.src='https://ui-avatars.com/api/?name=${provider.name}&background=2563EB&color=fff'">
                                ${provider.verified ? '<span class="verified-badge"><i class="fas fa-check"></i></span>' : ''}
                                ${isPremium ? '<span class="premium-crown"><i class="fas fa-crown"></i></span>' : ''}
                            </div>
                            <div class="item-info">
                                <div class="item-name-row">
                                    <span class="item-name">${provider.name}</span>
                                    ${isPremium ? '<span class="primer-badge">PRIMER</span>' : ''}
                                </div>
                                <div class="item-meta">
                                    <i class="fas fa-star"></i> ${rating} • ${jobs} jobs
                                </div>
                                <div class="item-location">
                                    <i class="fas fa-map-pin"></i> ${location}
                                </div>
                                ${services.length > 0 ? `
                                    <div class="item-services">
                                        ${services.slice(0, 3).map(s => 
                                            `<span class="service-tag">${s}</span>`
                                        ).join('')}
                                        ${services.length > 3 ? '<span class="service-tag">+more</span>' : ''}
                                    </div>
                                ` : ''}
                            </div>
                            <button class="remove-btn" onclick="event.stopPropagation(); removeFavorite('${provider.id}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                });
                
                content.innerHTML = html;
            }

            // ========== ACTIONS ==========
            window.viewProvider = function(id) {
                window.location.href = `provider-detail.html?id=${id}`;
            };

            window.removeFavorite = function(id) {
                // Remove from array
                favoriteIds = favoriteIds.filter(fid => fid !== id);
                
                // Save to localStorage and notify other pages
                saveFavorites();
                
                // Update UI
                const updatedFavorites = allProviders.filter(p => favoriteIds.includes(p.id));
                renderFavorites(updatedFavorites);
                
                showToast('Removed from favorites');
            };

            // ========== TOAST ==========
            function showToast(message) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fas fa-check-circle" style="color: var(--primary);"></i><span>${message}</span>`;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 200);
                }, 2000);
            }
            window.showToast = showToast;

            // ========== EVENT LISTENERS ==========
            // Listen for favorites updates from other pages
            window.addEventListener('favoritesUpdated', (e) => {
                console.log('Favorites updated event received:', e.detail);
                favoriteIds = e.detail || [];
                // Ensure it's an array
                if (!Array.isArray(favoriteIds)) {
                    favoriteIds = [];
                }
                // Update UI
                const updatedFavorites = allProviders.filter(p => favoriteIds.includes(p.id));
                renderFavorites(updatedFavorites);
            });

            // Listen for storage events (when localStorage changes in another tab)
            window.addEventListener('storage', (e) => {
                if (e.key === 'primer_favorites') {
                    console.log('Storage event: favorites changed');
                    favoriteIds = e.newValue ? JSON.parse(e.newValue) : [];
                    if (!Array.isArray(favoriteIds)) {
                        favoriteIds = [];
                    }
                    const updatedFavorites = allProviders.filter(p => favoriteIds.includes(p.id));
                    renderFavorites(updatedFavorites);
                }
            });

            // Listen for page visibility changes (when user returns to this tab)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    console.log('Page became visible, reloading favorites');
                    favoriteIds = loadFavorites();
                    if (allProviders.length > 0) {
                        const updatedFavorites = allProviders.filter(p => favoriteIds.includes(p.id));
                        renderFavorites(updatedFavorites);
                    }
                }
            });

            // ========== INIT ==========
            function init() {
                loadUserData();
                loadFavorites(); // Load fresh favorites from localStorage
                loadProviders();
            }
            
            init();

            // Poll for changes every second (as a fallback for Safari)
            let lastFavoritesString = JSON.stringify(favoriteIds);
            setInterval(() => {
                const currentFavorites = loadFavorites();
                const currentString = JSON.stringify(currentFavorites);
                
                if (currentString !== lastFavoritesString) {
                    console.log('Polling detected favorites change');
                    favoriteIds = currentFavorites;
                    if (allProviders.length > 0) {
                        const updatedFavorites = allProviders.filter(p => favoriteIds.includes(p.id));
                        renderFavorites(updatedFavorites);
                    }
                    lastFavoritesString = currentString;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
