<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Primer • Provider Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #DBEAFE;
            --secondary: #059669;
            --accent: #7C3AED;
            --background: #F9FAFB;
            --surface: #FFFFFF;
            --surface-hover: #F3F4F6;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --header-height: 70px;
        }
        [data-theme="dark"] {
            --primary: #3B82F6;
            --primary-light: #1E3A8A;
            --background: #111827;
            --surface: #1F2937;
            --surface-hover: #374151;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --text-tertiary: #9CA3AF;
            --border: #374151;
        }
        body {
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
            line-height: 1.5;
            overflow-x: hidden;
            position: relative;
        }
        .bg-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.115;
            overflow: hidden;
        }
        .bg-icons i {
            position: absolute;
            font-size: 4.5rem;
            animation: float 22s infinite linear;
            user-select: none;
            filter: drop-shadow(0 0 5px rgba(37, 99, 235, 0.3));
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.5; transform: translateY(80vh) rotate(36deg) scale(1.1); }
            30% { opacity: 0.6; transform: translateY(60vh) rotate(108deg) scale(1.2); }
            50% { opacity: 0.7; transform: translateY(40vh) rotate(180deg) scale(1.1); }
            70% { opacity: 0.6; transform: translateY(20vh) rotate(252deg) scale(1); }
            90% { opacity: 0.4; transform: translateY(5vh) rotate(324deg) scale(0.9); }
            100% { transform: translateY(-20vh) rotate(360deg) scale(0.8); opacity: 0; }
        }

        #app {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            padding-bottom: 100px;
        }
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 40;
            height: var(--header-height);
            display: flex;
            align-items: center;
            width: 100%;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.7);
        }
        [data-theme="dark"] .app-header {
            background: rgba(31,41,55,0.8);
        }
        .header-content {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-text {
            font-weight: 700;
            font-size: 20px;
            color: var(--text-primary);
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .profile-hero {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            position: relative;
        }
        .profile-photo-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: -50px auto 0;
            z-index: 10;
        }
        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--surface);
            border: 4px solid var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .verified-large {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #3B82F6;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--surface);
        }
        .provider-name-large {
            text-align: center;
            margin-top: 12px;
            font-size: 24px;
            font-weight: 700;
        }
        .provider-title {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 0 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            display: block;
            color: var(--primary);
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .section {
            background: var(--surface);
            border-radius: var(--radius-xl);
            margin: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-row {
            display: flex;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .info-label {
            width: 100px;
            color: var(--text-secondary);
        }
        .info-value {
            flex: 1;
            font-weight: 500;
        }
        .area-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .area-tag {
            padding: 6px 12px;
            background: var(--surface-hover);
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid var(--border);
        }
        .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .service-tag {
            padding: 6px 16px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .sticky-call {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--surface);
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            z-index: 50;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.9);
        }
        [data-theme="dark"] .sticky-call {
            background: rgba(31,41,55,0.9);
        }
        .btn-call-now {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px var(--primary);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-call-now:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-call-now:active {
            transform: translateY(0);
        }
        .loading-provider {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .loading-provider i {
            font-size: 40px;
            margin-bottom: 16px;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            max-width: 380px;
            margin: 0 auto;
            z-index: 2000;
        }
        .toast {
            background: var(--surface);
            color: var(--text-primary);
            padding: 16px 22px;
            border-radius: 60px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            border-left: 6px solid var(--primary);
            animation: slideUp 0.2s;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .primer-call-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(37,99,235,0.5);
            z-index: 500;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid white;
            font-size: 26px;
            text-decoration: none;
        }
        .primer-call-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #DC2626;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            font-weight: 600;
        }
        .similar-providers-section {
            margin: 24px 16px;
        }
        .similar-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .recommended-badge {
            background: var(--secondary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 8px;
        }
        .provider-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .provider-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .provider-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
        }
        .provider-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
            position: relative;
            overflow: hidden;
        }
        .provider-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .provider-info {
            flex: 1;
        }
        .provider-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .provider-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }
        .provider-rating i {
            color: #FBBF24;
        }
        .availability-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            position: absolute;
            right: 0;
            top: 0;
        }
        .availability-badge.available {
            background: #D1FAE5;
            color: #065F46;
        }
        .availability-badge.busy {
            background: #FEE2E2;
            color: #991B1B;
        }
        .btn-view-small {
            padding: 8px 16px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="bg-icons">
        <i class="fas fa-truck"></i><i class="fas fa-tools"></i><i class="fas fa-wrench"></i><i class="fas fa-camera"></i>
    </div>

    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <a href="javascript:history.back()" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
                    <span class="logo-text">Provider Profile</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <div id="providerContent">
            <div class="loading-provider" id="loadingProvider">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Loading provider profile...</p>
            </div>
        </div>

        <!-- Similar Providers Section (will be populated dynamically) -->
        <div id="similarProvidersSection" class="similar-providers-section" style="display: none;">
            <div class="similar-title">
                <i class="fas fa-thumbs-up"></i>
                Similar providers you might like
            </div>
            <div id="similarProvidersList"></div>
        </div>

        <!-- Sticky Call Button -->
        <div class="sticky-call" id="stickyCall" style="display: none;">
            <a href="#" class="btn-call-now" id="callNowBtn">
                <i class="fas fa-phone-alt"></i> Call Provider
            </a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    
    <!-- Primer Call Button -->
    <a href="tel:+2348100590574" class="primer-call-btn" id="primerCallBtn">
        <i class="fas fa-phone-alt"></i>
        <span class="badge">Primer</span>
    </a>

    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            function syncThemeWithApp() {
                const appTheme = localStorage.getItem('primer_theme') || 'light';
                html.setAttribute('data-theme', appTheme);
                themeToggle.innerHTML = appTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
            
            syncThemeWithApp();
            
            themeToggle.addEventListener('click', () => {
                const current = html.getAttribute('data-theme') || 'light';
                const next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('primer_theme', next);
                themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            function loadUserFromApp() {
                try {
                    const savedUser = localStorage.getItem('primer_user');
                    if (savedUser) {
                        return JSON.parse(savedUser);
                    }
                } catch (e) {}
                return { city: 'Kaduna', name: 'Guest User', phone: '', email: '' };
            }

            const userData = loadUserFromApp();
            const urlParams = new URLSearchParams(window.location.search);
            const providerId = urlParams.get('id');
            let currentProvider = null;
            let allProviders = [];

            function sendCallNotification(provider) {
                const formData = new FormData();
                formData.append('_subject', `Call Request: ${provider.name}`);
                formData.append('user_name', userData.name || 'Guest User');
                formData.append('user_phone', userData.phone || 'Not provided');
                formData.append('user_email', userData.email || 'Not provided');
                formData.append('user_city', userData.city || 'Kaduna');
                formData.append('provider_name', provider.name);
                formData.append('provider_phone', provider.phone);
                formData.append('provider_id', provider.id);
                formData.append('provider_service', provider.services.join(', '));
                formData.append('provider_rating', provider.rating);
                formData.append('timestamp', new Date().toISOString());

                fetch('https://formspree.io/f/your-endpoint', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                }).catch(error => console.warn('Failed to send call notification:', error));
                
                showToast(`Calling ${provider.name}...`, 'info');
            }

            function loadProvider() {
                if (!providerId) {
                    showToast('No provider specified', 'error');
                    return;
                }

                // Special case for Primer company
                if (providerId === 'primer_moving') {
                    renderPrimerCompany();
                    loadSimilarProviders('moving');
                    return;
                }

                fetch('providers.json')
                    .then(res => res.json())
                    .then(data => {
                        allProviders = data.providers || [];
                        const provider = allProviders.find(p => p.id === providerId);
                        if (provider) {
                            currentProvider = provider;
                            renderProviderProfile(provider);
                            loadSimilarProviders(provider.services[0], provider.id);
                        } else {
                            showToast('Provider not found', 'error');
                            document.getElementById('loadingProvider').innerHTML = `
                                <i class="fas fa-exclamation-circle"></i>
                                <p>Provider not found</p>
                            `;
                        }
                    })
                    .catch(error => {
                        console.error('Error loading provider:', error);
                        showToast('Failed to load provider', 'error');
                    });
            }

            function loadSimilarProviders(service, excludeId = null) {
                const userCity = userData.city || 'Kaduna';
                let similar = allProviders.filter(p => 
                    p.services.includes(service) && 
                    p.id !== excludeId &&
                    p.serviceAreas && p.serviceAreas.includes(userCity)
                ).slice(0, 3);

                if (similar.length === 0) {
                    // If no similar in same city, show any similar providers
                    similar = allProviders.filter(p => 
                        p.services.includes(service) && 
                        p.id !== excludeId
                    ).slice(0, 3);
                }

                if (similar.length > 0) {
                    const similarSection = document.getElementById('similarProvidersSection');
                    const similarList = document.getElementById('similarProvidersList');
                    
                    similarList.innerHTML = similar.map(provider => {
                        const avatarSrc = provider.avatar || `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232563EB' rx='50'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E${provider.name.charAt(0)}%3C/text%3E%3C/svg%3E`;
                        
                        return `
                        <div class="provider-card" onclick="window.location.href='provider-detail.html?id=${provider.id}'">
                            <div class="provider-header">
                                <div class="provider-avatar">
                                    <img src="${avatarSrc}" alt="${provider.name}">
                                </div>
                                <div class="provider-info">
                                    <div class="provider-name">${provider.name}</div>
                                    <div class="provider-rating">
                                        <i class="fas fa-star"></i> ${provider.rating} (${provider.completedJobs} jobs)
                                    </div>
                                </div>
                                <div class="availability-badge ${provider.availability}">
                                    ${provider.availability === 'available' ? 'Available' : 'Busy'}
                                </div>
                            </div>
                            <div class="btn-view-small" onclick="event.stopPropagation(); window.location.href='provider-detail.html?id=${provider.id}'">View Profile</div>
                        </div>
                    `}).join('');
                    
                    similarSection.style.display = 'block';
                }
            }

            function renderPrimerCompany() {
                document.getElementById('loadingProvider').style.display = 'none';
                document.getElementById('stickyCall').style.display = 'block';
                
                const content = document.getElementById('providerContent');
                content.innerHTML = `
                    <div class="profile-hero"></div>
                    <div class="profile-photo-container">
                        <div class="profile-photo">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FFFFFF' rx='20'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='%232563EB' font-family='Arial' font-weight='bold'%3EP%3C/text%3E%3C/svg%3E" alt="Primer">
                        </div>
                        <div class="verified-large"><i class="fas fa-check"></i></div>
                    </div>
                    <div class="provider-name-large">Primer Moving Services <span class="recommended-badge">RECOMMENDED</span></div>
                    <div class="provider-title">Company-owned • Premium Service</div>

                    <div class="stats-grid">
                        <div class="stat-card"><span class="stat-value">4.9</span><span class="stat-label">Rating</span></div>
                        <div class="stat-card"><span class="stat-value">1000+</span><span class="stat-label">Jobs</span></div>
                        <div class="stat-card"><span class="stat-value">24/7</span><span class="stat-label">Available</span></div>
                        <div class="stat-card"><span class="stat-value">✓</span><span class="stat-label">Vetted</span></div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-info-circle"></i> About</div>
                        <p style="color: var(--text-secondary); line-height: 1.6;">Primer's own moving service. Fully vetted, insured, and managed by Primer. Available 24/7 for all your moving needs in Kaduna and surrounding areas.</p>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-map-marker-alt"></i> Service Areas</div>
                        <div class="area-tags">
                            <span class="area-tag">Kaduna</span>
                            <span class="area-tag">Zaria</span>
                            <span class="area-tag">Kano</span>
                            <span class="area-tag">Abuja</span>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-truck"></i> Services</div>
                        <div class="service-tags">
                            <span class="service-tag">Moving</span>
                            <span class="service-tag">Packing</span>
                            <span class="service-tag">Storage</span>
                            <span class="service-tag">Furniture Assembly</span>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-phone"></i> Contact</div>
                        <div class="info-row">
                            <span class="info-label">Phone:</span>
                            <span class="info-value"><a href="tel:+2348100590574" style="color: var(--primary); text-decoration: none;">+234 810 059 0574</a></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email:</span>
                            <span class="info-value">moving@primer.com</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Response:</span>
                            <span class="info-value">Within 5 minutes</span>
                        </div>
                    </div>
                `;

                document.getElementById('callNowBtn').href = 'tel:+2348100590574';
                document.getElementById('callNowBtn').onclick = function(e) {
                    e.preventDefault();
                    sendCallNotification({
                        name: 'Primer Moving Services',
                        phone: '+2348100590574',
                        services: ['moving'],
                        id: 'primer_moving',
                        rating: '4.9'
                    });
                    window.location.href = 'tel:+2348100590574';
                };
            }

            function renderProviderProfile(provider) {
                document.getElementById('loadingProvider').style.display = 'none';
                document.getElementById('stickyCall').style.display = 'block';
                
                const content = document.getElementById('providerContent');
                const mainService = provider.services[0];
                const avatarSrc = provider.avatar || `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232563EB' rx='50'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E${provider.name.charAt(0)}%3C/text%3E%3C/svg%3E`;

                content.innerHTML = `
                    <div class="profile-hero"></div>
                    <div class="profile-photo-container">
                        <div class="profile-photo">
                            <img src="${avatarSrc}" alt="${provider.name}">
                        </div>
                        ${provider.verified ? '<div class="verified-large"><i class="fas fa-check"></i></div>' : ''}
                    </div>
                    <div class="provider-name-large">${provider.name}</div>
                    <div class="provider-title">${provider.services.map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' • ')} Provider</div>

                    <div class="stats-grid">
                        <div class="stat-card"><span class="stat-value">${provider.rating}</span><span class="stat-label">Rating</span></div>
                        <div class="stat-card"><span class="stat-value">${provider.completedJobs}</span><span class="stat-label">Jobs</span></div>
                        <div class="stat-card"><span class="stat-value">${provider.responseTime}</span><span class="stat-label">Min resp</span></div>
                        <div class="stat-card"><span class="stat-value">${provider.availability === 'available' ? '✓' : '⏰'}</span><span class="stat-label">${provider.availability === 'available' ? 'Available' : 'Busy'}</span></div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-info-circle"></i> About</div>
                        <p style="color: var(--text-secondary); line-height: 1.6;">Professional ${mainService} provider with ${provider.completedJobs}+ completed jobs. Verified and trusted by Primer.</p>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-map-marker-alt"></i> Service Areas</div>
                        <div class="area-tags">
                            ${provider.serviceAreas.map(area => `<span class="area-tag">${area}</span>`).join('')}
                        </div>
                        <div class="info-row" style="margin-top: 12px;">
                            <span class="info-label">Current:</span>
                            <span class="info-value">${provider.currentLocation}</span>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-tools"></i> Services</div>
                        <div class="service-tags">
                            ${provider.services.map(s => `<span class="service-tag">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`).join('')}
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><i class="fas fa-phone"></i> Contact</div>
                        <div class="info-row">
                            <span class="info-label">Phone:</span>
                            <span class="info-value"><a href="tel:${provider.phone}" style="color: var(--primary); text-decoration: none;">${provider.phone}</a></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email:</span>
                            <span class="info-value">${provider.email}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Response:</span>
                            <span class="info-value">Within ${provider.responseTime} minutes</span>
                        </div>
                    </div>
                `;

                document.getElementById('callNowBtn').href = `tel:${provider.phone}`;
                document.getElementById('callNowBtn').onclick = function(e) {
                    e.preventDefault();
                    sendCallNotification(provider);
                    window.location.href = `tel:${provider.phone}`;
                };
            }

            function showToast(message, type = 'info') {
                const toastContainer = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                
                let icon = 'fa-info-circle';
                if (type === 'success') icon = 'fa-check-circle';
                if (type === 'error') icon = 'fa-exclamation-circle';
                
                toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
                toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            loadProvider();
        })();
    </script>
</body>
</html>
